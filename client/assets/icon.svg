<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1b2d"/>
      <stop offset="100%" stop-color="#1a2d4a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#f0a000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Decorative border -->
  <rect x="20" y="20" width="472" height="472" rx="85" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.3"/>

  <!-- Spade (top-left) -->
  <g transform="translate(130, 140) scale(0.7)">
    <path d="M60 0 C60 0 0 50 0 85 C0 110 20 125 40 125 C48 125 55 122 60 117 L55 155 L65 155 L60 117 C65 122 72 125 80 125 C100 125 120 110 120 85 C120 50 60 0 60 0Z" fill="#e2e8f0"/>
  </g>

  <!-- Heart (top-right) -->
  <g transform="translate(290, 140) scale(0.7)">
    <path d="M60 30 C60 30 0 -15 0 40 C0 80 60 120 60 120 C60 120 120 80 120 40 C120 -15 60 30 60 30Z" fill="#ef4444"/>
  </g>

  <!-- Diamond (bottom-left) -->
  <g transform="translate(130, 280) scale(0.7)">
    <path d="M60 0 L110 65 L60 130 L10 65Z" fill="#ef4444"/>
  </g>

  <!-- Club (bottom-right) -->
  <g transform="translate(290, 280) scale(0.7)">
    <circle cx="60" cy="45" r="30" fill="#e2e8f0"/>
    <circle cx="35" cy="80" r="30" fill="#e2e8f0"/>
    <circle cx="85" cy="80" r="30" fill="#e2e8f0"/>
    <rect x="52" y="90" width="16" height="40" fill="#e2e8f0"/>
  </g>

  <!-- SURRI text -->
  <text x="256" y="256" text-anchor="middle" dominant-baseline="central"
        font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72"
        fill="url(#gold)" letter-spacing="8">SURRI</text>

  <!-- Subtle glow behind text -->
  <text x="256" y="256" text-anchor="middle" dominant-baseline="central"
        font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72"
        fill="#ffd700" opacity="0.15" filter="blur(8px)" letter-spacing="8">SURRI</text>
</svg>
