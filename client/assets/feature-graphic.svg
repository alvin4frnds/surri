<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0f1b2d"/>
      <stop offset="100%" stop-color="#1a2d4a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#f0a000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Decorative border -->
  <rect x="15" y="15" width="994" height="470" rx="20" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.2"/>

  <!-- Left card suit cluster -->
  <!-- Spade -->
  <g transform="translate(80, 120) scale(0.55)" opacity="0.25">
    <path d="M60 0 C60 0 0 50 0 85 C0 110 20 125 40 125 C48 125 55 122 60 117 L55 155 L65 155 L60 117 C65 122 72 125 80 125 C100 125 120 110 120 85 C120 50 60 0 60 0Z" fill="#e2e8f0"/>
  </g>
  <!-- Heart -->
  <g transform="translate(140, 300) scale(0.5)" opacity="0.2">
    <path d="M60 30 C60 30 0 -15 0 40 C0 80 60 120 60 120 C60 120 120 80 120 40 C120 -15 60 30 60 30Z" fill="#ef4444"/>
  </g>

  <!-- Right card suit cluster -->
  <!-- Diamond -->
  <g transform="translate(830, 100) scale(0.5)" opacity="0.2">
    <path d="M60 0 L110 65 L60 130 L10 65Z" fill="#ef4444"/>
  </g>
  <!-- Club -->
  <g transform="translate(870, 300) scale(0.5)" opacity="0.25">
    <circle cx="60" cy="45" r="30" fill="#e2e8f0"/>
    <circle cx="35" cy="80" r="30" fill="#e2e8f0"/>
    <circle cx="85" cy="80" r="30" fill="#e2e8f0"/>
    <rect x="52" y="90" width="16" height="40" fill="#e2e8f0"/>
  </g>

  <!-- Title -->
  <text x="512" y="200" text-anchor="middle" dominant-baseline="central"
        font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="90"
        fill="url(#gold)" letter-spacing="12">SURRI</text>

  <!-- Glow behind title -->
  <text x="512" y="200" text-anchor="middle" dominant-baseline="central"
        font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="90"
        fill="#ffd700" opacity="0.1" filter="blur(12px)" letter-spacing="12">SURRI</text>

  <!-- Subtitle -->
  <text x="512" y="280" text-anchor="middle"
        font-family="Arial, sans-serif" font-weight="400" font-size="28"
        fill="#94a3b8" letter-spacing="3">INDIAN CARD GAME</text>

  <!-- Tagline -->
  <text x="512" y="340" text-anchor="middle"
        font-family="Arial, sans-serif" font-weight="400" font-size="20"
        fill="#64748b" letter-spacing="2">A classic dealer-centric trick-taking game</text>

  <!-- Decorative line -->
  <line x1="370" y1="310" x2="654" y2="310" stroke="#ffd700" stroke-width="1" opacity="0.3"/>
</svg>
